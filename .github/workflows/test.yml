name: "Test"

on: [push, pull_request]
jobs:
    test:
        name: "Test"
        runs-on: "ubuntu-latest"
        steps:
        - uses: actions/checkout@v5
        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'
        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
        - name: Test with pytest
          run: |
            pip install pytest pytest-cov async-timeout
            if [ -z "${{ secrets.NOTION_TOKEN }}" ] || [ -z "${{ secrets.NOTION_DATABASE_ID }}" ]; then
              echo "Skipping integration tests because NOTION_TOKEN or NOTION_DATABASE_ID is not configured."
              exit 0
            fi
            NOTION_TOKEN="${{ secrets.NOTION_TOKEN }}" \
              NOTION_DATABASE_ID="${{ secrets.NOTION_DATABASE_ID }}" \
              pytest ./custom_components/notion_todo/test*.py
